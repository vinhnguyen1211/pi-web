<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pi Web</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Session selection screen (shown before connecting) -->
  <div id="session-screen">
    <div class="session-screen-inner">
      <div class="session-logo">πcode</div>
      <p class="session-subtitle">Choose a session to connect or start a new one</p>

      <button id="btn-new-session" class="btn-primary" disabled>
        <span class="btn-icon">+</span> New Session
      </button>

      <div id="workspace-row" class="workspace-row">
        <select id="workspace-select" disabled>
          <option disabled selected>Select workspace…</option>
        </select>
        <button id="btn-add-workspace" title="Add workspace">+</button>
      </div>

      <div id="add-workspace-form" class="hidden">
        <input id="workspace-name-input" type="text" placeholder="Name" spellcheck="false">
        <input id="workspace-path-input" type="text" placeholder="/absolute/path/to/project" spellcheck="false">
        <button id="btn-browse-workspace">Browse</button>
        <button id="btn-save-workspace" class="btn-primary">Save</button>
        <button id="btn-cancel-workspace">Cancel</button>
      </div>

      <div id="session-list-container" class="hidden">
        <div class="session-divider">
          <span>Existing Sessions</span>
        </div>
        <div id="session-list"></div>
      </div>
    </div>
  </div>

  <!-- Header bar (shown when connected) -->
  <header id="header" class="hidden">
    <div class="header-left">
      <a class="logo" href="/">πcode</a>
      <button id="btn-disconnect" title="Disconnect and return to session list">Disconnect</button>
    </div>
    <div class="header-right">
      <select id="model-select" class="hidden" title="Change model">
        <option disabled selected>Model</option>
      </select>
      <span id="token-info" class="token-info hidden"></span>
      <button id="btn-theme-toggle" title="Toggle dark/light theme">◑</button>
    </div>
  </header>

  <!-- Main chat area (shown when connected) -->
  <main id="chat-container" class="hidden">
    <div id="messages"></div>

    <!-- Compaction overlay -->
    <div id="compaction-overlay" class="hidden">
      <span class="spinner"></span> Compacting context…
    </div>

    <!-- Loading indicator (shown on agent_start, hidden on agent_end) -->
    <div id="loading-indicator" class="hidden">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>
  </main>

  <!-- Queue display (steer / follow-up items waiting in queue) -->
  <div id="queue-bar" class="hidden">
    <span class="queue-label">Queue:</span>
    <div id="queue-items"></div>
  </div>

  <!-- Abort button (visible while streaming) -->
  <button id="btn-abort" class="hidden" title="Abort current response">⏹ Abort</button>

  <!-- Input area (shown when connected) -->
  <footer id="input-area" class="hidden">
    <!-- Image preview strip — shown when images are staged -->
    <div id="image-preview-strip" class="hidden"></div>
    <div id="input-row">
      <textarea
        id="prompt-input"
        placeholder="Send a message to Pi… (use ! for bash commands, paste/drag-drop images)"
        rows="1"
        autofocus
      ></textarea>
      <button id="btn-send" title="Send"><span class="send-arrow">↑</span><span class="bash-badge">$</span></button>
    </div>
  </footer>

  <!-- Extension UI modal (select / confirm / input / editor) -->
  <dialog id="extension-modal">
    <div class="modal-content">
      <h3 id="modal-title"></h3>
      <p id="modal-message"></p>
      <div id="modal-body"></div>
      <div class="modal-actions">
        <button id="modal-btn-cancel" class="hidden">Cancel</button>
        <button id="modal-btn-confirm">OK</button>
      </div>
    </div>
  </dialog>

  <!-- Extension status notification -->
  <div id="extension-notify" class="hidden"></div>

  <script src="/js/diff.min.js"></script>
  <script src="/js/marked.min.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
